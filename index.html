<!DOCTYPE html>
<html>
<head>
    <title>Canva Chess Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #board { width: 450px; margin-top: 20px; }
        .status-box { margin-bottom: 10px; font-size: 1.2rem; }
        #game-over-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 10px; text-align: center; border: 2px solid white; z-index: 1000; }
        button { padding: 10px 20px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="status-box" id="status">White's Turn</div>
    <div id="board"></div>

    <div id="game-over-overlay">
        <h1 id="winner-text">Checkmate!</h1>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            // Check if it's a promotion
            var sourceRank = source.substring(1,2);
            var targetRank = target.substring(1,2);
            var piece = game.get(source).type;

            if (piece === 'p' && ((sourceRank === '7' && targetRank === '8') || (sourceRank === '2' && targetRank === '1'))) {
                var promo = prompt("Promote to: Q (Queen), R (Rook), B (Bishop), or N (Knight)?").toLowerCase();
                if (!['q', 'r', 'b', 'n'].includes(promo)) promo = 'q';
                var move = game.move({ from: source, to: target, promotion: promo });
            } else {
                var move = game.move({ from: source, to: target });
            }

            if (move === null) return 'snapback';

            updateStatus();
            
            // Flip the board after a 500ms delay so you can see the move land
            window.setTimeout(function() {
                board.orientation(game.turn() === 'w' ? 'white' : 'black');
            }, 500);
        }

        function updateStatus () {
            var status = '';
            var moveColor = 'White';
            if (game.turn() === 'b') moveColor = 'Black';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
                showGameOver(moveColor === 'White' ? 'Black Wins!' : 'White Wins!');
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
                showGameOver('It is a Draw!');
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }
            $status.html(status);
        }

        function showGameOver(text) {
            $('#winner-text').text(text);
            $('#game-over-overlay').show();
        }

        function resetGame() {
            game.reset();
            board.start();
            board.orientation('white');
            $('#game-over-overlay').hide();
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: function (piece) {
                // This assumes your Canva images are uploaded to the same GitHub folder
                return piece + '.png';
            }
        };
        board = Chessboard('board', config);
        updateStatus();
    </script>
</body>
</html>
